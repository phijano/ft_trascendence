<messages>
    {% if messages %}
    <div>
    {% for message in messages %}
    <div class="message alert-{{ message.tags }}">
        <div>
            <div class="text-lg">{{ message }}</div>
        </div>
        <div class="close-btn" onclick="this.parentElement.style.display='none';">
            &times;
        </div>
    </div>
    {% endfor %}
    </div>
    {% endif %}
</messages>
