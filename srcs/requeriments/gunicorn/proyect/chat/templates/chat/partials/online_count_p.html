<span id="online-count" hx-swap-oob="outerHTML" class="fade-in-scale pe-1">
    {{ online_count }}
    <style>
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(4); }
            to { opacity: 1; transform: scale(1); }
        }
        .fade-in-scale {
            animation: fadeInScale 0.6s ease;
        }
    </style>
</span>

{% if online_count %}
    <div id="online-icon" class="position-absolute top-0 start-0 rounded-circle bg-success p-2"></div>
{% else %}
    <div id="online-icon" class="position-absolute top-0 start-0 rounded-circle bg-secondary p-2"></div>
{% endif %}
